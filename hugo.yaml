baseURL: "https://elf7f.github.io/"
languageCode: "zh-cn"
title: "Wenzy Blog"
theme: "PaperMod"
paginate: 10

pagination:
  pagerSize: 5

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  author: wenzy
  defaultTheme: auto
  disableThemeToggle: false
  params:
  homeInfoParams:
    Title: "Hi there \U0001F44B"
    Content: >
      记录开发中的问题、思路与实现细节。

  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: false
  UseHugoToc: true
  disableSpecial1stPost: true
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

menu:
  main:
    - identifier: posts
      name: 文章
      url: /posts/
      weight: 5
    - identifier: categories
      name: 分类
      url: /categories/
      weight: 10
    - identifier: tags
      name: 标签
      url: /tags/
      weight: 20
    - identifier: archives
      name: 归档
      url: /archives/
      weight: 30
    - identifier: search
      name: 搜索
      url: /search/
      weight: 40
    - identifier: github
      name: GitHub
      url: https://github.com/elf7f
      weight: 50

outputs:
  home:
    - HTML
    - JSON
  section:
    - HTML
  taxonomy:
    - HTML
  term:
    - HTML

taxonomies:
  category: categories
  tag: tags

pygmentsUseClasses: true

markup:
  highlight:
    noClasses: false